version: '3.8'

services:
  cc3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc3
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/app.db
      - DIRECT_DATABASE_URL=file:./data/app.db
      - DATABASE_BACKUP_DIR=./data/backups
      - PRISMA_ACCELERATE_DISABLED=true
      - PRISMA_TELEMETRY_DISABLED=1
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./.prismarc:/root/.prismarc
      - ./.prisma:/root/.prisma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
