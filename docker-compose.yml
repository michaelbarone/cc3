version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-sqlite-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DOCKER_CONTAINER=true
      # DATABASE_URL will be used by Prisma migrations
      - DATABASE_URL=file:/app/data/app.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
